    <!-- ================= SCRIPT WHATSAPP ================= -->
    <script>
        // Adiciona evento ao enviar o formulário
        document.getElementById('whatsappForm').addEventListener('submit', function(e){
            
            e.preventDefault(); // impede envio padrão

            const telefone = '5541999999999'; // número destino

            // Captura os valores dos campos
            const nome = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const mensagem = document.getElementById('message').value;
            
            // Monta a mensagem
            const text = `Olá \n Meu nome é ${nome}, meu email é: ${email}.\nMensagem: ${mensagem}`;

            // Codifica para URL
            const encodedText = encodeURIComponent(text);

            // Cria link do WhatsApp
            const whatsappURL = `https://wa.me/${telefone}?text=${encodedText}`;

            // Abre o WhatsApp em nova aba
            window.open(whatsappURL, "_blank");        
        })
    </script>
